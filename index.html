<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media | Dan van den Hoek</title>
<style>
:root{--cyan:#00BCD4;--bg:#111216;--panel:#17191f;--text:#f5f5f5;--muted:#bfc5cc;--line:#3b4048}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px),var(--bg);background-size:44px 44px;color:var(--text)}
.wrap{width:100%;max-width:none;margin:0 auto;padding:16px 14px 42px}
.header{display:none}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 18px}
.search{flex:1 1 260px;min-width:220px;padding:12px 13px;background:#0f1116;color:var(--text);border:1px solid var(--line);border-radius:0;font-size:1rem;font-family:'Courier New',monospace}
button.filter{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px 12px;cursor:pointer;font-weight:800;font-family:'Courier New',monospace;text-transform:uppercase}
button.filter.active,button.filter:hover{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,188,212,.35)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:rgba(23,25,31,.94);border:1px solid var(--line);padding:18px;min-height:190px;display:flex;flex-direction:column;justify-content:space-between}
.card:hover{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,188,212,.22)}
.topline{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}.tag,.topic{display:inline-block;font-family:'Courier New',monospace;font-weight:800;font-size:.78rem;color:var(--muted);border:1px solid var(--line);padding:4px 7px}.topic{color:#dffbff;border-color:rgba(0,188,212,.55)}
.source{color:var(--muted);font-family:'Courier New',monospace;font-weight:800;margin-bottom:8px}.title{font-weight:900;font-size:1.08rem;line-height:1.28;margin:0 0 10px}.desc{color:var(--muted);font-size:.94rem;line-height:1.42;margin:0 0 18px}.actions{margin-top:auto}
.actions a,.disabled{display:inline-block;color:var(--text);background:#10141a;border:1px solid #17333a;text-decoration:none;padding:10px 12px;font-family:'Courier New',monospace;font-size:1rem;text-transform:uppercase;box-shadow:0 0 14px rgba(0,188,212,.28)}.actions a:hover{border-color:var(--cyan)}.disabled{opacity:.62;box-shadow:none}.empty{border:1px dashed var(--line);padding:24px;color:var(--muted);background:var(--panel)}
@media(max-width:1200px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:820px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:520px){.grid{grid-template-columns:1fr}.wrap{padding:14px 10px 34px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="header"><div id="meta">Loading outputs...</div></header>
  <section class="controls">
    <input id="q" class="search" placeholder="Search outputs..." aria-label="Search outputs">
    <button class="filter active" data-category="All">All</button>
    <span id="category-buttons"></span>
  </section>
  <section id="grid" class="grid"><div class="empty">Loading outputs...</div></section>
</div>
<script>
const grid=document.getElementById('grid'),q=document.getElementById('q'),meta=document.getElementById('meta'),categoryButtons=document.getElementById('category-buttons');let activeCategory='All',outputs=[];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function card(item){const url=String(item.url||'').trim();const btn=item.button_text||(item.category==='Broadcast & Audio'?'Listen now':'View output');const action=url?`<a target="_blank" rel="noopener noreferrer" href="${esc(url)}">${esc(btn)} ↗</a>`:`<span class="disabled">${esc(btn)}</span>`;const date=[item.source,item.year].filter(Boolean).join(' · ');return `<article class="card"><div><div class="topline"><span class="tag">${esc(item.category||'Output')}</span><span class="topic">${esc(item.topic||'Research Translation')}</span></div><div class="source">${esc(date)}</div><h2 class="title">${esc(item.title)}</h2><p class="desc">${esc(item.description)}</p></div><div class="actions">${action}</div></article>`}
function render(){const term=q.value.trim().toLowerCase();const filtered=outputs.filter(item=>{const haystack=[item.title,item.source,item.category,item.topic,item.description,item.year].join(' ').toLowerCase();return(activeCategory==='All'||item.category===activeCategory)&&(!term||haystack.includes(term))});grid.innerHTML=filtered.length?filtered.map(card).join(''):'<div class="empty">No outputs match the current filter.</div>'}
function setupFilters(){document.querySelectorAll('button.filter').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('button.filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeCategory=btn.dataset.category;render()}))}
fetch('outputs.json?v=20260716-fourcol',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`Could not load outputs.json: ${r.status}`);return r.json()}).then(payload=>{outputs=payload.outputs||[];const categories=[...new Set(outputs.map(item=>item.category||'Output'))].sort();categoryButtons.innerHTML=categories.map(c=>`<button class="filter" data-category="${esc(c)}">${esc(c)}</button>`).join('');meta.innerHTML=`<strong>${outputs.length}</strong> outputs listed.`;setupFilters();q.addEventListener('input',render);render()}).catch(err=>{console.error(err);grid.innerHTML='<div class="empty">Unable to load outputs. Check that outputs.json exists in this repository.</div>'});
</script>
</body>
</html>
