name: Build and validate public outputs

on:
  workflow_dispatch:
  schedule:
    # Monthly rebuild and validation on the first day of each month.
    - cron: '17 2 1 * *'
  push:
    paths:
      - 'posts/**'
      - 'scripts/build_commentary.py'
      - 'outputs.json'
      - 'index.html'
      - '.github/workflows/validate-outputs.yml'

permissions:
  contents: write

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build commentary articles and media index
        run: python scripts/build_commentary.py

      - name: Validate outputs JSON and links
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          from urllib.parse import urlparse

          path = Path('outputs.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          outputs = payload.get('outputs')
          if not isinstance(outputs, list) or not outputs:
              raise SystemExit('outputs.json must contain a non-empty outputs list')

          required = ['title', 'source', 'category', 'topic', 'description', 'url', 'button_text']
          link_required_words = re.compile(r'\b(read|listen|view|watch|open|download)\b', re.I)
          allowed_unlinked = {
              'no public recording',
              'details pending',
              'link pending',
              'not publicly available',
              'unavailable',
          }

          seen = set()
          for i, item in enumerate(outputs, start=1):
              missing = [field for field in required if field not in item]
              if missing:
                  raise SystemExit(f'Output {i} is missing: {missing}')

              title = str(item.get('title', '')).strip()
              if not title:
                  raise SystemExit(f'Output {i} has an empty title')

              duplicate_key = (title.lower(), str(item.get('source', '')).strip().lower())
              if duplicate_key in seen:
                  raise SystemExit(f'Duplicate output detected: {title}')
              seen.add(duplicate_key)

              button = str(item.get('button_text', '')).strip()
              url = str(item.get('url', '')).strip()
              button_key = button.lower()

              if url:
                  parsed = urlparse(url)
                  if parsed.scheme not in {'http', 'https'} or not parsed.netloc:
                      raise SystemExit(f'Output {i} ({title}) has an invalid URL: {url}')
                  if 'utm_source=chatgpt.com' in url.lower():
                      raise SystemExit(f'Output {i} ({title}) still contains a ChatGPT tracking parameter')
              else:
                  if link_required_words.search(button):
                      raise SystemExit(
                          f'Output {i} ({title}) has button_text "{button}" but no URL. '
                          'Add a URL or change the button text to an allowed disabled label.'
                      )
                  if button_key not in allowed_unlinked:
                      raise SystemExit(
                          f'Output {i} ({title}) has no URL and unsupported disabled button text: "{button}"'
                      )

          article_files = list(Path('articles').glob('*.html'))
          post_files = list(Path('posts').glob('*.md'))
          if len(article_files) != len(post_files):
              raise SystemExit(
                  f'Expected one generated article per post; found {len(post_files)} posts and '
                  f'{len(article_files)} articles.'
              )

          print(f'Validated {len(outputs)} outputs, {len(post_files)} posts and hyperlink rules.')
          PY

      - name: Commit generated files
        if: github.event_name != 'pull_request'
        run: |
          if git diff --quiet -- outputs.json articles/; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add outputs.json articles/
          git commit -m 'Build commentary articles and refresh media index'
          git push
