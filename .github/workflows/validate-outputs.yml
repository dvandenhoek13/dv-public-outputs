name: Validate public outputs

on:
  workflow_dispatch:
  push:
    paths:
      - 'outputs.json'
      - 'index.html'
      - '.github/workflows/validate-outputs.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate outputs JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('outputs.json')
          payload = json.loads(path.read_text(encoding='utf-8'))
          outputs = payload.get('outputs')
          if not isinstance(outputs, list) or not outputs:
              raise SystemExit('outputs.json must contain a non-empty outputs list')

          required = ['title', 'source', 'category', 'topic', 'description', 'url', 'button_text']
          for i, item in enumerate(outputs, start=1):
              missing = [field for field in required if field not in item]
              if missing:
                  raise SystemExit(f'Output {i} is missing: {missing}')
              if not str(item.get('title', '')).strip():
                  raise SystemExit(f'Output {i} has an empty title')

          print(f'Validated {len(outputs)} outputs.')
          PY
